<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Executivo • ExecutivoVilaBelaMT</title>
  <link rel="stylesheet" href="/executivo-vilabela-mt/style.css" />
  <style>
    .panel-topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      backdrop-filter: blur(14px);
      background: rgba(8,17,32,0.88);
      border-bottom: 1px solid var(--line);
    }

    .panel-brand h1 {
      margin: 0;
      font-size: 1.12rem;
    }

    .panel-brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .panel-badge {
      display: inline-flex;
      margin-top: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(212,175,55,0.35);
      background: rgba(212,175,55,0.08);
      color: #f6df93;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .panel-menu-toggle {
      display: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
    }

    .panel-nav {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .panel-nav a,
    .panel-nav button {
      padding: 9px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      text-decoration: none;
      font: inherit;
    }

    .panel-nav a:hover,
    .panel-nav a.active,
    .panel-nav button:hover {
      color: var(--text);
      border-color: rgba(212,175,55,0.45);
      background: rgba(212,175,55,0.08);
    }

    .panel-userbar {
      width: min(1180px, calc(100% - 32px));
      margin: 14px auto 0;
    }

    .usuario-chip {
      display: inline-flex;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      font-size: 0.92rem;
    }

    .toolbar {
      display: grid;
      gap: 16px;
      margin-bottom: 20px;
    }

    .toolbar-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 16px;
    }

    .input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    .mini-note {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 8px;
      line-height: 1.5;
    }

    @media (max-width: 980px) {
      .toolbar-grid {
        grid-template-columns: 1fr;
      }

      .panel-menu-toggle {
        display: inline-flex;
      }

      .panel-nav {
        display: none;
        width: 100%;
        flex-direction: column;
        align-items: stretch;
        margin-top: 10px;
      }

      .panel-nav.open {
        display: flex;
      }

      .panel-topbar {
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .panel-nav a,
      .panel-nav button {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <header class="panel-topbar">
    <div class="panel-brand">
      <h1>ExecutivoVilaBelaMT</h1>
      <p>Painel Executivo</p>
      <span class="panel-badge">Perfil Executivo</span>
    </div>

    <button class="panel-menu-toggle" id="panel-menu-toggle" aria-label="Abrir menu">
      ☰
    </button>

    <nav class="panel-nav" id="panel-nav">
