<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • ExecutivoVilaBelaMT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">
  <h2>Login do Sistema</h2>

  <select id="perfil" class="input">
    <option value="prefeito">Prefeito / Executivo</option>
    <option value="vereador">Vereador / Legislativo</option>
    <option value="controle">Controle</option>
  </select>

  <input id="usuario" class="input" placeholder="Usuário">
  <input id="senha" type="password" class="input" placeholder="Senha">

  <button class="btn" onclick="entrar()">Entrar</button>

  <p id="erro" style="color:red; display:none;"></p>

  <br>
  <a href="/executivo-vilabela-mt/index.html">Voltar</a>
</main>

<script src="config.js"></script>
<script>
  function entrar() {
    const perfil = document.getElementById("perfil").value;
    const usuario = document.getElementById("usuario").value;
    const senha = document.getElementById("senha").value;

    if (PERFIS[perfil] && senha === PERFIS[perfil].senha) {
      salvarSessao(usuario, perfil);
      window.location.href = PERFIS[perfil].destino;
    } else {
      const erro = document.getElementById("erro");
      erro.textContent = "Login inválido";
      erro.style.display = "block";
    }
  }
</script>

</body>
</html>
